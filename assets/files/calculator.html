<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Glass Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Animated Aurora Background */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #0b0f19;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb:nth-child(1) {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #ff2a85;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: #8a2be2;
            animation-delay: -5s;
        }

        .orb:nth-child(3) {
            top: 20%;
            left: 40%;
            width: 40vw;
            height: 40vw;
            background: #00d2ff;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Glassmorphism Calculator Container */
        .glass-calc {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 380px;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .glass-calc:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        /* Display Screen */
        .display-screen {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-around;
            word-wrap: break-word;
            word-break: break-all;
            height: 120px;
        }

        .previous-operand {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            min-height: 1.5rem;
            letter-spacing: 1px;
        }

        .current-operand {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Buttons */
        .calc-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            color: white;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 64px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        /* Specialized Buttons */
        .btn-operator {
            color: #00d2ff;
            background: rgba(0, 210, 255, 0.05);
            font-weight: 600;
        }
        .btn-operator:hover {
            background: rgba(0, 210, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .btn-action {
            color: #ff2a85;
            background: rgba(255, 42, 133, 0.05);
            font-weight: 600;
        }
        .btn-action:hover {
            background: rgba(255, 42, 133, 0.15);
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.3);
        }

        .btn-equals {
            background: linear-gradient(135deg, #8a2be2, #ff2a85);
            color: white;
            font-weight: 700;
            border: none;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }
        .btn-equals:hover {
            background: linear-gradient(135deg, #9d4edd, #ff4d9a);
            box-shadow: 0 0 30px rgba(255, 42, 133, 0.6);
            border: none;
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="aurora-bg">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Calculator UI -->
    <main class="glass-calc m-4">
        <div class="display-screen">
            <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand">0</div>
        </div>

        <div class="grid grid-cols-4 gap-3">
            <!-- Row 1 -->
            <button data-all-clear class="calc-btn btn-action col-span-2">AC</button>
            <button data-delete class="calc-btn btn-action">DEL</button>
            <button data-operation="÷" class="calc-btn btn-operator">÷</button>

            <!-- Row 2 -->
            <button data-number="7" class="calc-btn">7</button>
            <button data-number="8" class="calc-btn">8</button>
            <button data-number="9" class="calc-btn">9</button>
            <button data-operation="×" class="calc-btn btn-operator">×</button>

            <!-- Row 3 -->
            <button data-number="4" class="calc-btn">4</button>
            <button data-number="5" class="calc-btn">5</button>
            <button data-number="6" class="calc-btn">6</button>
            <button data-operation="-" class="calc-btn btn-operator">-</button>

            <!-- Row 4 -->
            <button data-number="1" class="calc-btn">1</button>
            <button data-number="2" class="calc-btn">2</button>
            <button data-number="3" class="calc-btn">3</button>
            <button data-operation="+" class="calc-btn btn-operator">+</button>

            <!-- Row 5 -->
            <button data-number="0" class="calc-btn col-span-2">0</button>
            <button data-number="." class="calc-btn">.</button>
            <button data-equals class="calc-btn btn-equals">=</button>
        </div>
    </main>

    <!-- Calculator Logic -->
    <script>
        class Calculator {
            constructor(previousOperandTextElement, currentOperandTextElement) {
                this.previousOperandTextElement = previousOperandTextElement;
                this.currentOperandTextElement = currentOperandTextElement;
                this.clear();
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.shouldResetScreen = false;
            }

            delete() {
                if (this.currentOperand === '0' || this.currentOperand.length === 1) {
                    this.currentOperand = '0';
                    return;
                }
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
            }

            appendNumber(number) {
                if (this.shouldResetScreen) {
                    this.currentOperand = '';
                    this.shouldResetScreen = false;
                }
                if (number === '.' && this.currentOperand.includes('.')) return;
                
                // Don't allow multiple leading zeros
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number.toString();
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
            }

            chooseOperation(operation) {
                if (this.currentOperand === '' && this.previousOperand === '') return;
                
                // Allow changing operation if one is already selected
                if (this.currentOperand === '') {
                    this.operation = operation;
                    return;
                }

                if (this.previousOperand !== '') {
                    this.compute();
                }
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '';
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                if (isNaN(prev) || isNaN(current)) return;

                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '×':
                        computation = prev * current;
                        break;
                    case '÷':
                        if (current === 0) {
                            computation = "Error"; // Prevent division by zero
                        } else {
                            computation = prev / current;
                        }
                        break;
                    default:
                        return;
                }

                // Handle precision issues (e.g., 0.1 + 0.2)
                if (computation !== "Error") {
                    computation = Math.round(computation * 100000000) / 100000000;
                }
                
                this.currentOperand = computation.toString();
                this.operation = undefined;
                this.previousOperand = '';
                this.shouldResetScreen = true;
            }

            getDisplayNumber(number) {
                if (number === "Error") return number;
                const stringNumber = number.toString();
                const integerDigits = parseFloat(stringNumber.split('.')[0]);
                const decimalDigits = stringNumber.split('.')[1];
                let integerDisplay;
                if (isNaN(integerDigits)) {
                    integerDisplay = '';
                } else {
                    integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
                }
                if (decimalDigits != null) {
                    return `${integerDisplay}.${decimalDigits}`;
                } else {
                    return integerDisplay;
                }
            }

            updateDisplay() {
                // Formatting limits for massive numbers so it doesn't break UI
                if (this.currentOperand.length > 15 && this.currentOperand !== "Error") {
                    this.currentOperandTextElement.innerText = Number(this.currentOperand).toExponential(5);
                } else {
                    this.currentOperandTextElement.innerText = this.getDisplayNumber(this.currentOperand);
                }

                if (this.operation != null) {
                    this.previousOperandTextElement.innerText = 
                        `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
                } else {
                    this.previousOperandTextElement.innerText = '';
                }
            }
        }

        // DOM Elements
        const numberButtons = document.querySelectorAll('[data-number]');
        const operationButtons = document.querySelectorAll('[data-operation]');
        const equalsButton = document.querySelector('[data-equals]');
        const deleteButton = document.querySelector('[data-delete]');
        const allClearButton = document.querySelector('[data-all-clear]');
        const previousOperandTextElement = document.querySelector('[data-previous-operand]');
        const currentOperandTextElement = document.querySelector('[data-current-operand]');

        // Initialize Calculator
        const calculator = new Calculator(previousOperandTextElement, currentOperandTextElement);

        // Event Listeners
        numberButtons.forEach(button => {
            button.addEventListener('click', () => {
                calculator.appendNumber(button.innerText);
                calculator.updateDisplay();
            });
        });

        operationButtons.forEach(button => {
            button.addEventListener('click', () => {
                calculator.chooseOperation(button.innerText);
                calculator.updateDisplay();
            });
        });

        equalsButton.addEventListener('click', button => {
            calculator.compute();
            calculator.updateDisplay();
        });

        allClearButton.addEventListener('click', button => {
            calculator.clear();
            calculator.updateDisplay();
        });

        deleteButton.addEventListener('click', button => {
            calculator.delete();
            calculator.updateDisplay();
        });

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key >= 0 && e.key <= 9 || e.key === '.') {
                calculator.appendNumber(e.key);
                calculator.updateDisplay();
            }
            if (e.key === '=' || e.key === 'Enter') {
                e.preventDefault(); // Prevent accidental form submissions if any
                calculator.compute();
                calculator.updateDisplay();
            }
            if (e.key === 'Backspace') {
                calculator.delete();
                calculator.updateDisplay();
            }
            if (e.key === 'Escape') {
                calculator.clear();
                calculator.updateDisplay();
            }
            if (e.key === '+' || e.key === '-') {
                calculator.chooseOperation(e.key);
                calculator.updateDisplay();
            }
            if (e.key === '*') {
                calculator.chooseOperation('×');
                calculator.updateDisplay();
            }
            if (e.key === '/') {
                calculator.chooseOperation('÷');
                calculator.updateDisplay();
            }
        });
    </script>
</body>
</html>
